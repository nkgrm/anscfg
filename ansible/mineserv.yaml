---
- name: Поднятие сервера для minecraft forge 1.20.1
  hosts: server
  become: true
  vars:
    minecraft_version_link: "https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.4.10/forge-1.20.1-47.4.10-installer.jar"
    java_version: openjdk-17-jre-headless
    server_path: /home/user/forge-server
  tasks:
    - name: Установка пакетов
      ansible.builtin.package:
        name: "{{ java_version }}"
        state: present
        update_cache: true

    - name: Cоздание рабочей директории
      ansible.builtin.file:
        path: {{ server_path }}
        state: directory
        mode: "0777"

    - name: Скачивание версии
      ansible.builtin.get_url:
        url: "{{ minecraft_version_link }}"
        dest: "{{ server_path }}/forge-1.20.1-47.4.10-installer.jar"
        mode: "0777"

    - name: Установка версии
      ansible.builtin.command:
      cmd: "java -jar forge-1.20.1-47.4.10-installer.jar --installServer"
    chdir: "{{ server_path }}"
    creates: "{{ server_path }}/run.sh"

